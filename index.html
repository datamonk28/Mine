```html
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Her</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Great+Vibes&family=Libre+Baskerville:wght@400;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}

:root{
  --blush:#d4607a;
  --blush-lt:#f0a0b4;
  --cream:#fef9f5;
  --mauve:#e8c8d8;
  --plum:#7c3d6e;
  --bg:#160d1c;
  --bg2:#1e0f28;
}

html{scroll-behavior:smooth}
body{
  background:var(--bg);
  color:var(--cream);
  font-family:'Libre Baskerville', serif;
  overflow-x:hidden;
}

/* LOCK SCREEN */
#lock{
  position:fixed;inset:0;z-index:100;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  background:#0e0814;
}
.lock-title{
  font-family:'Great Vibes',cursive;
  font-size:3rem;
  margin-bottom:10px;
}
input{
  padding:10px;
  text-align:center;
  border:none;
  border-bottom:1px solid var(--blush);
  background:transparent;
  color:white;
}
button{
  margin-top:10px;
  padding:10px 25px;
  cursor:pointer;
}

/* HERO */
.hero{
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
}
.hero-name{
  font-family:'Great Vibes',cursive;
  font-size:5rem;
}

/* SECTION */
.section{
  padding:80px 20px;
  opacity:0;
  transform:translateY(40px);
  transition:0.8s ease;
}
.section.visible{
  opacity:1;
  transform:translateY(0);
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(250px,1fr));
  gap:20px;
}
.card{
  height:300px;
  background:var(--bg2);
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
  transition:0.3s;
}
.card.active{
  outline:2px solid var(--blush-lt);
  box-shadow:0 0 30px var(--blush);
  transform:scale(1.05);
}

/* MUSIC BUTTON */
#music-btn{
  position:fixed;
  top:20px;
  right:20px;
}

/* PETALS */
#particles{position:fixed;inset:0;pointer-events:none;z-index:0}
.petal{
  position:absolute;
  width:10px;height:14px;
  background:var(--blush-lt);
  border-radius:50% 0 50% 0;
  animation:fall linear infinite;
}
@keyframes fall{
  0%{transform:translateY(-20px);opacity:0}
  10%{opacity:0.7}
  100%{transform:translateY(100vh);opacity:0}
}

/* TREASURE */
#treasure-modal{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.8);
  justify-content:center;
  align-items:center;
}
#treasure-modal.open{display:flex}
.box{
  background:#1e0f28;
  padding:30px;
  border-radius:10px;
  text-align:center;
}
</style>
</head>

<body>

<div id="particles"></div>

<audio id="music" loop>
  <source src="music/your-song.mp3" type="audio/mpeg">
</audio>
<button id="music-btn">♪</button>

<div id="lock">
  <div class="lock-title">A World For You</div>
  <input id="pwd" type="password" placeholder="enter password">
  <button onclick="unlock()">Enter</button>
</div>

<div id="main" style="display:none">

<div class="hero">
  <div class="hero-name">My Love</div>
  <div onclick="scrollToSection()">Scroll ↓</div>
</div>

<div class="section" id="section">
  <div class="grid" id="grid"></div>
</div>

<div style="text-align:center;padding:50px">
  <button onclick="openTreasure()">🎁 Treasure</button>
</div>

</div>

<div id="treasure-modal">
  <div class="box">
    <h2 style="font-family:'Great Vibes'">I love you ❤️</h2>
    <button onclick="closeTreasure()">Close</button>
  </div>
</div>

<script>
const PASSWORD="yoursecretword";

/* UNLOCK */
function unlock(){
  if(document.getElementById('pwd').value===PASSWORD){
    document.getElementById('lock').style.display='none';
    document.getElementById('main').style.display='block';
    fadeMusic();
  }
}

/* MUSIC */
const music=document.getElementById('music');
document.getElementById('music-btn').onclick=()=>{
  if(music.paused) music.play();
  else music.pause();
};

function fadeMusic(){
  music.volume=0;
  music.play();
  let v=0;
  const i=setInterval(()=>{
    v+=0.02;
    if(v>=0.4){v=0.4;clearInterval(i);}
    music.volume=v;
  },120);
}

/* SCROLL */
function scrollToSection(){
  document.getElementById('section').scrollIntoView({behavior:'smooth'});
}

/* SECTION ANIMATION */
const observer=new IntersectionObserver(entries=>{
  entries.forEach(e=>{
    if(e.isIntersecting) e.target.classList.add('visible');
  });
});
document.querySelectorAll('.section').forEach(s=>observer.observe(s));

/* PHOTOS */
const grid=document.getElementById('grid');
for(let i=1;i<=6;i++){
  const card=document.createElement('div');
  card.className='card';
  card.innerText='Photo '+i;

  card.onclick=()=>{
    document.querySelectorAll('.card').forEach(c=>c.classList.remove('active'));
    card.classList.add('active');
  };

  grid.appendChild(card);
}

/* PETALS */
const container=document.getElementById('particles');
for(let i=0;i<25;i++){
  const p=document.createElement('div');
  p.className='petal';
  p.style.left=Math.random()*100+'%';
  p.style.animationDuration=5+Math.random()*10+'s';
  container.appendChild(p);
}

/* TREASURE */
function openTreasure(){
  document.getElementById('treasure-modal').classList.add('open');
}
function closeTreasure(){
  document.getElementById('treasure-modal').classList.remove('open');
}
</script>

</body>
</html>
```
