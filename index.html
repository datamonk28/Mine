<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>For Her</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Great+Vibes&family=Libre+Baskerville:wght@400;700&display=swap" rel="stylesheet"/>

<style>
*{margin:0;padding:0;box-sizing:border-box}

:root{
  --blush:#d4607a;
  --blush-lt:#f0a0b4;
  --cream:#fef9f5;
  --mauve:#e8c8d8;
  --bg:#160d1c;
}

html{scroll-behavior:smooth;}
body{
  background:var(--bg);
  color:var(--cream);
  font-family:'Libre Baskerville',serif;
  overflow-x:hidden;
}

/* HERO */
.hero{
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  flex-direction:column;
  text-align:center;
}

.hero-name{
  font-family:'Great Vibes',cursive;
  font-size:4rem;
}

/* SECTION */
.section{
  padding:80px 24px;
  opacity:0;
  transform:translateY(40px);
  transition:0.8s ease;
}
.section.visible{
  opacity:1;
  transform:translateY(0);
}

/* PHOTO */
.photo-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(250px,1fr));
  gap:20px;
}

.photo-card{
  height:300px;
  background:#1e0f28;
  display:flex;
  align-items:center;
  justify-content:center;
  transition:0.3s;
  cursor:pointer;
}

.photo-card.active{
  outline:2px solid var(--blush-lt);
  outline-offset:4px;
  box-shadow:0 0 30px var(--blush);
  transform:scale(1.05);
}

/* LOCK */
#lock-screen{
  position:fixed;
  inset:0;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  background:#0e0814;
}

button{padding:10px 20px;margin-top:10px}

/* MUSIC BTN */
#music-toggle{
  position:fixed;
  top:20px;
  right:20px;
}
</style>
</head>

<body>

<audio id="bg-audio" loop>
  <source src="music/your-song.mp3" type="audio/mpeg">
</audio>
<button id="music-toggle">♪</button>

<div id="lock-screen">
  <h1 style="font-family:'Great Vibes';">A World For You</h1>
  <input id="pwd-input" type="password" placeholder="enter password">
  <button onclick="tryUnlock()">Enter</button>
</div>

<div id="main" style="display:none">

<section class="hero">
  <div class="hero-name">My Love</div>
  <div onclick="smoothScrollTo(document.querySelector('.section'))">
    Scroll ↓
  </div>
</section>

<div class="section">
  <div class="photo-grid" id="photo-grid"></div>
</div>

</div>

<script>
const PASSWORD="yoursecretword";

/* SMOOTH SCROLL */
function smoothScrollTo(target, duration=900){
  const targetY=target.getBoundingClientRect().top+window.pageYOffset;
  const startY=window.scrollY;
  const diff=targetY-startY;
  let start;

  function ease(t){
    return t<0.5?2*t*t:1-Math.pow(-2*t+2,2)/2;
  }

  function step(timestamp){
    if(!start) start=timestamp;
    const progress=Math.min((timestamp-start)/duration,1);
    window.scrollTo(0,startY+diff*ease(progress));
    if(progress<1) requestAnimationFrame(step);
  }

  requestAnimationFrame(step);
}

/* SECTION REVEAL */
const observer=new IntersectionObserver(entries=>{
  entries.forEach(e=>{
    if(e.isIntersecting) e.target.classList.add('visible');
  });
},{threshold:0.2});

document.querySelectorAll('.section').forEach(s=>observer.observe(s));

/* MUSIC */
const audio=document.getElementById('bg-audio');
const btn=document.getElementById('music-toggle');

function fadeInMusic(){
  audio.volume=0;
  audio.play();
  let v=0;
  const i=setInterval(()=>{
    v+=0.02;
    if(v>=0.4){v=0.4;clearInterval(i);}
    audio.volume=v;
  },120);
}

btn.onclick=()=>{
  if(audio.paused) audio.play();
  else audio.pause();
};

/* UNLOCK */
function tryUnlock(){
  if(document.getElementById('pwd-input').value===PASSWORD){
    document.getElementById('lock-screen').style.display='none';
    document.getElementById('main').style.display='block';
    fadeInMusic();
  }
}

/* PHOTOS */
const grid=document.getElementById('photo-grid');

for(let i=1;i<=6;i++){
  const card=document.createElement('div');
  card.className='photo-card';
  card.innerText='Photo '+i;

  card.onclick=()=>{
    document.querySelectorAll('.photo-card')
      .forEach(c=>c.classList.remove('active'));

    card.classList.add('active');
  };

  grid.appendChild(card);
}
</script>

</body>
</html>
